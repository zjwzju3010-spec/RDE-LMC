model:
  llm: "DeepSeek-V3.2"
  embedding: "/home/u22502058/models/Qwen3-Embedding-0.6B"
  embedding_dim: 1024

paths:
  raw_laws_dir: "data/raw_laws"
  processed_kb_dir: "data/processed_kb"
  dataset_path: "data/dataset/dataset.jsonl"
  kb_json: "data/processed_kb/kb.json"
  corpus_json: "data/processed_kb/corpus.json"
  embeddings_npy: "data/processed_kb/embeddings.npy"
  article_ids_json: "data/processed_kb/article_ids.json"
  bm25_cache: "data/processed_kb/bm25_cache.pkl"
